<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff6b00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DPK Seller">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Product Details - Delightpk</title>
</head>
<style>
:root {
  --bg-body: #f8f8f8;
  --bg-card: #fff;
  --bg-input: #fafafa;
  --bg-desc: #fff7ef;
  --bg-info: #ffeedb;
  --text-primary: #333;
  --text-secondary: #444;
  --text-heading: #ef6c00;
  --border-color: #ddd;
  --shadow-card: 0 3px 10px rgba(0,0,0,0.1);
  --bottom-bar-bg: #fff;
  --bottom-bar-border: #f0f0f0;
  --bottom-bar-text: #999;
}

[data-theme="dark"] {
  --bg-body: #0a0a1a;
  --bg-card: #16162a;
  --bg-input: #1e1e3a;
  --bg-desc: #1a1a2e;
  --bg-info: #1e1e3a;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0c0;
  --text-heading: #ff8c00;
  --border-color: #2a2a4a;
  --shadow-card: 0 4px 20px rgba(0,0,0,0.5);
  --bottom-bar-bg: #16162a;
  --bottom-bar-border: #2a2a4a;
  --bottom-bar-text: #8888aa;
}

/* Smooth transitions for all theme changes */
* {
  transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
}

/* ===== DARK MODE TOGGLE BUTTON ===== */
.theme-switch-wrapper {
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 100000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.theme-switch {
  position: relative;
  width: 56px;
  height: 30px;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(239, 108, 0, 0.3), inset 0 1px 3px rgba(255,255,255,0.2);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  border: 2px solid transparent;
}

.theme-switch::before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 22px;
  height: 22px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.theme-switch .switch-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  transition: all 0.3s ease;
  pointer-events: none;
}

.theme-switch .switch-sun { left: 8px; color: #fff; opacity: 1; }
.theme-switch .switch-moon { right: 8px; color: #fff; opacity: 0.5; }

[data-theme="dark"] .theme-switch {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3), inset 0 1px 3px rgba(255,255,255,0.1);
}

[data-theme="dark"] .theme-switch::before {
  left: calc(100% - 26px);
  background: #1e1e3a;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

[data-theme="dark"] .theme-switch .switch-sun { opacity: 0.5; }
[data-theme="dark"] .theme-switch .switch-moon { opacity: 1; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
}

/* Header */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(135deg, #ff6a00, #ff3d00);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 65px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  border-bottom-left-radius: 35px;
  border-bottom-right-radius: 35px;
  z-index: 10;
}

.back-btn {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  cursor: pointer;
}

.back-btn img { width: 22px; height: 22px; }

header h4 {
  color: #fff;
  font-size: 21px;
  font-weight: 600;
}

/* Container */
.container {
  margin-top: 70px;
  padding: 15px;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}

/* Image */
.product-image {
  width: 100%;
  border-radius: 14px;
  box-shadow: var(--shadow-card);
}

/* Details Box */
.details {
  background: var(--bg-card);
  padding: 15px;
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  margin-top: 15px;
}

.details h2 {
  font-size: 18px;
  margin: 0;
  color: var(--text-primary);
}

.price {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-heading);
  margin: 10px 0;
}

/* Info Badges */
.info-box {
  display: inline-block;
  padding: 6px 10px;
  background: var(--bg-info);
  border-radius: 8px;
  margin-right: 6px;
  margin-bottom: 6px;
  color: var(--text-primary);
  font-size: 13px;
  font-weight: 500;
}

/* Description Box */
.desc {
  background: var(--bg-desc);
  padding: 12px;
  border-radius: 10px;
  margin-top: 12px;
  border-left: 4px solid var(--text-heading);
}

.desc h3 {
  font-size: 15px;
  margin-bottom: 8px;
  color: var(--text-primary);
}

.desc p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.desc ul {
  padding-left: 18px;
  margin: 0;
}

.desc ul li {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

</style>
<body>
<header>
  <div class="back-btn" onclick="history.back()">
    <img src="Delight icons/Back.png" alt="Back">
  </div>
  <h4>Product Details</h4>
</header>

<div class="container">
  <img id="mainImage" class="product-image" alt="Product Image">
  <div class="details" id="details">
    <h2>Loading...</h2>
  </div>
</div>

<script>
// 🔹 formatDescription(): Paragraph + Bullets
function formatDescription(desc) {
  if (!desc) return "";

  desc = desc.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();

  const clean = s => s
    .replace(/^[\s\-\*\u2022•]+/, "")
    .replace(/^\d+\.\s*/, "")
    .replace(/\s{2,}/g, " ")
    .trim();

  // CASE A: explicit bullets present
  if (desc.includes("•") || desc.includes("\u2022")) {
    const parts = desc.split(/•|\u2022/).map(p => clean(p)).filter(Boolean);
    if (!parts.length) return "";
    if (parts.length > 1 && parts[0].length < 60 && !parts[0].includes(":")) {
      const intro = parts.shift();
      return `<p>${intro}</p><ul>${parts.map(p => `<li>${p}</li>`).join("")}</ul>`;
    }
    return `<ul>${parts.map(p => `<li>${p}</li>`).join("")}</ul>`;
  }

  // CASE B: split by new lines
  const lines = desc.split("\n").map(l => clean(l)).filter(Boolean);
  if (!lines.length) return "";
  if (lines.length === 1) return `<p>${lines[0]}</p>`;

  const first = lines[0];
  const rest = lines.slice(1);
  if (rest.length && first.length < 200 && !first.includes(":")) {
    return `<p>${first}</p><ul>${rest.map(l => `<li>${l}</li>`).join("")}</ul>`;
  }

  return `<ul>${lines.map(l => `<li>${l}</li>`).join("")}</ul>`;
}

// 🔹 Render product details
window.onload = () => {
  const product = JSON.parse(localStorage.getItem("selectedItem"));

  if (!product) {
    document.getElementById("details").innerHTML = "<p>No product data found!</p>";
    return;
  }

  // Image
  document.getElementById("mainImage").src =
    (product.images && product.images.length > 0)
      ? product.images[0]
      : product.image || "";

  // Render
  document.getElementById("details").innerHTML = `
    <h2>${product.title || "No Title"}</h2>
    <p class="price">Price: ${product.price || "Advance Paid"}</p>

    ${product.color ? `<div class="info-box">Color: ${product.color}</div>` : ""}
    ${product.size ? `<div class="info-box">Size: ${product.size}</div>` : ""}

    <div class="desc">
      <h3>Description</h3>
      ${formatDescription(product.description)}
    </div>
  `;
};
</script>
<script>
(function() {
  const isDark = localStorage.getItem("darkMode") === "true";
  if (isDark) document.documentElement.setAttribute("data-theme", "dark");
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>

</body>
</html>

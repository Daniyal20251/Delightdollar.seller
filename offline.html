<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delightpk Seller - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff6b00, #ff8c00);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 80px; height: 80px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .logo img { width: 56px; height: 56px; border-radius: 12px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
    p { font-size: 15px; opacity: 0.85; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: white;
      color: #ff6b00;
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/icon-192.png" alt="Delightpk Seller">
  </div>
  <div class="subtitle">Delightpk Seller Portal</div>
  <h1>Internet Nahi Hai 📶</h1>
  <p>Internet connection check karo aur dobara try karo۔</p>
  <button onclick="window.location.reload()">🔄 Dobara Try Karo</button>
</body>
</html>

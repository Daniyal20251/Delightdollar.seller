<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="Signup.css">
  <meta name="theme-color" content="#ff6b00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DPK Seller">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
  <title>Sign Up - Delightpk</title>
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="delight">
    <h2>Hy👋</h2>
    <h2>WELCOME TO</h2>
    <h1>DELIGHT SHOP🛍</h1>
  </div>

  <div class="logo">
    <img src="Delight icons/Logo.png" width="200" height="200" alt="Delight.logo">
  </div>

  <div class="login">
    <h3>Sign Up</h3>
    <form id="signupForm">
      <input type="text" id="name" required placeholder="Please enter your name"><br>
      <input type="number" id="phone" required placeholder="Please enter your phone number" minlength="11" maxlength="11"><br>

      <!-- 👁️ Eye Toggle Password -->
      <div class="password-wrapper">
        <input type="password" id="pass" required placeholder="Minimum 6 characters" minlength="6">
        <span class="toggle-password" onclick="togglePassword()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div><br>

      <input type="submit" id="signupBtn" value="Sign Up">
    </form>

    <p style="margin-top:12px; font-size:13px; text-align:center;">
      Already have an account?
      <a href="login.html" style="color:#ef6c00; text-decoration:none; font-weight:bold;">
        🔑 Login
      </a>
    </p>
  </div>

  <script>
    // ========== TOAST NOTIFICATION SYSTEM ==========
    function showToast(message, type = "info", duration = 3000) {
      const container = document.getElementById("toastContainer");

      const icons = {
        success: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
        error: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`,
        warning: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
        info: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`
      };

      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        ${icons[type] || icons.info}
        <span>${message}</span>
        <span class="toast-close" onclick="hideToast(this)">&times;</span>
      `;

      container.appendChild(toast);

      if (duration > 0) {
        setTimeout(() => {
          hideToast(toast.querySelector(".toast-close"));
        }, duration);
      }
    }

    function hideToast(closeBtn) {
      const toast = closeBtn.closest(".toast");
      if (!toast) return;
      toast.classList.add("hiding");
      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }

    // ========== BUTTON LOADING STATE ==========
    function setLoading(loading) {
      const btn = document.getElementById("signupBtn");
      if (loading) {
        btn.classList.add("loading");
        btn.value = "Signing up...";
      } else {
        btn.classList.remove("loading");
        btn.value = "Sign Up";
      }
    }

    // ========== EYE TOGGLE ==========
    function togglePassword() {
      const passInput = document.getElementById("pass");
      const eyeIcon = document.getElementById("eyeIcon");

      if (passInput.type === "password") {
        passInput.type = "text";
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        passInput.type = "password";
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }

    // ========== FORM SUBMIT ==========
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", async function(event){
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const pass = document.getElementById("pass").value.trim();

      if (!name) {
        showToast("⚠️ Please enter your name", "warning");
        return;
      }

      if (phone.length !== 11) {
        showToast("⚠️ Phone number must be 11 digits", "warning");
        return;
      }

      if (pass.length < 6) {
        showToast("⚠️ Password must be at least 6 characters", "warning");
        return;
      }

      setLoading(true);

      const payload = { name, phone, password: pass };

      try {
        const baseUrl = "https://delight-backend--araindaniyalo2.replit.app";

        // Step 1: Signup user
        const res = await fetch(baseUrl + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("Signup response:", data);

        if (res.ok && data.success) {
          // Save user data
          const sellerData = { 
            id: data.user.id,
            name: data.user.name,
            phone: data.user.phone
          };

          localStorage.setItem("seller", JSON.stringify(sellerData));

          console.log("Saved to localStorage:", sellerData);

          // ✅ Step 2: Also create seller in database
          try {
            console.log("Creating seller in database...");

            const sellerSignupRes = await fetch(baseUrl + "/seller-signup", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: name,
                phone: phone,
                password: pass
              })
            });

            const sellerResult = await sellerSignupRes.json();
            console.log("Seller created:", sellerResult);
          } catch(e) {
            console.log("Seller create error (might already exist):", e);
          }

          showToast("✅ Signup successful! Redirecting...", "success", 2000);

          setTimeout(() => {
            window.location.href = "SP.Name.html";
          }, 1500);
        } else {
          setLoading(false);
          showToast(data.message || "❌ Signup failed. Try again.", "error");
        }
      } catch (err) {
        console.error(err);
        setLoading(false);
        showToast("⚠️ Unable to connect. Please check backend.", "error");
      }
    });
  </script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>

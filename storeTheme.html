<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff6b00">
<title>Store Theme - Delightpk</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ===== CSS VARIABLES — LIGHT (default) ===== */
:root {
  --st-bg: #f2f2f7;
  --st-card: #ffffff;
  --st-text: #1a1a2e;
  --st-sub: #888;
  --st-border: #f0f0f5;
  --st-active-bg: #ffffff;
  --st-apply-bg: #ffffff;
  --st-apply-border: #eee;
  --st-header-grad: linear-gradient(135deg,#ff5500,#ff7b00,#ff9500);
  --st-section-color: #ff6b00;
  --st-active-border: #ff6b00;
  --st-shadow: 0 2px 12px rgba(0,0,0,0.08);
  --st-toast-bg: #1a1a2e;
  --st-toast-text: #fff;
}

/* ===== DARK MODE VARIABLES ===== */
html[data-theme="dark"] {
  --st-bg: #0a0a1a;
  --st-card: #16162a;
  --st-text: #e8e8f0;
  --st-sub: #6a6a8a;
  --st-border: #2a2a4a;
  --st-active-bg: #1e1e3a;
  --st-apply-bg: #16162a;
  --st-apply-border: #2a2a4a;
  --st-header-grad: linear-gradient(135deg,#1a0800,#2d1400,#3a1e00);
  --st-section-color: #ff8c00;
  --st-active-border: #ff8c00;
  --st-shadow: 0 2px 16px rgba(0,0,0,0.45);
  --st-toast-bg: #e8e8f0;
  --st-toast-text: #1a1a2e;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--st-bg);
  color: var(--st-text);
  padding-top: 70px;
  padding-bottom: 90px;
  min-height: 100vh;
  transition: background 0.35s ease, color 0.35s ease;
}

/* HEADER */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: var(--st-header-grad);
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 999;
  box-shadow: 0 3px 20px rgba(255,107,0,0.4);
  transition: background 0.35s ease;
}
.back-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 16px;
  margin-right: 12px;
  text-decoration: none;
  flex-shrink: 0;
}
header h4 { color: #fff; font-size: 18px; font-weight: 800; flex: 1; }

/* SECTION TITLE */
.section-title {
  padding: 18px 16px 8px;
  font-size: 13px;
  font-weight: 800;
  color: var(--st-section-color);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: color 0.35s;
}

/* ACTIVE THEME BADGE */
.active-info {
  margin: 0 16px 16px;
  background: var(--st-active-bg);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--st-shadow);
  border: 2px solid var(--st-active-border);
  transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
}
.active-info .dot {
  width: 14px; height: 14px;
  background: #22c55e;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}
.active-info .label { font-size: 12px; color: var(--st-sub); transition: color 0.35s; }
.active-info .name { font-size: 15px; font-weight: 800; color: var(--st-text); transition: color 0.35s; }

/* THEME GRID */
.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 16px;
}

/* THEME CARD */
.theme-card {
  border-radius: 18px;
  overflow: hidden;
  background: var(--st-card);
  box-shadow: var(--st-shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.35s;
  border: 3px solid transparent;
  position: relative;
}
.theme-card:active { transform: scale(0.97); }
.theme-card.selected {
  border-color: #22c55e;
  box-shadow: 0 6px 24px rgba(34,197,94,0.25);
}
.theme-card.selected::after {
  content: '✓';
  position: absolute;
  top: 8px; right: 8px;
  width: 26px; height: 26px;
  background: #22c55e;
  color: #fff;
  font-size: 13px;
  font-weight: 900;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  line-height: 26px;
  text-align: center;
}

/* THEME PREVIEW */
.theme-preview {
  height: 110px;
  position: relative;
  overflow: hidden;
}
.preview-header {
  height: 26px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
}
.preview-header-title {
  font-size: 8px; font-weight: 800;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.preview-logo {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  flex-shrink: 0;
}
.preview-cards {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  padding: 5px 6px;
}
.preview-card {
  border-radius: 5px;
  height: 55px;
  overflow: hidden;
}
.preview-card-img { height: 36px; background: rgba(255,255,255,0.25); }
.preview-card-body {
  padding: 2px 3px; height: 19px;
  display: flex; flex-direction: column; gap: 2px;
}
.preview-card-line {
  height: 3px; border-radius: 2px;
  background: rgba(0,0,0,0.12); width: 80%;
}
.preview-card-price {
  height: 3px; border-radius: 2px; width: 55%;
}

.theme-label {
  padding: 10px 12px;
  border-top: 1px solid var(--st-border);
  transition: border-color 0.35s;
}
.theme-name { font-size: 13px; font-weight: 800; color: var(--st-text); transition: color 0.35s; }
.theme-desc { font-size: 10px; color: var(--st-sub); margin-top: 2px; transition: color 0.35s; }

/* APPLY BUTTON */
.apply-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--st-apply-bg);
  padding: 14px 20px;
  box-shadow: 0 -2px 16px rgba(0,0,0,0.12);
  border-top: 1px solid var(--st-apply-border);
  transition: background 0.35s, border-color 0.35s;
}
.apply-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #ff5500, #ff9500);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 16px; font-weight: 800;
  border: none; border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,100,0,0.35);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.2s;
}
.apply-btn:active { opacity: 0.85; }
.apply-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

/* TOAST */
.toast {
  position: fixed;
  top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--st-toast-bg);
  color: var(--st-toast-text);
  padding: 10px 22px;
  border-radius: 30px;
  font-size: 13px; font-weight: 700;
  z-index: 9999; opacity: 0;
  transition: opacity 0.3s, background 0.35s, color 0.35s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>

<!-- Apply dark mode BEFORE render to avoid flash -->
<script>
(function() {
  const mode = localStorage.getItem("darkMode");
  // default is dark (same as index.js logic: null = dark)
  const isDark = mode === null ? true : mode === "true";
  if (isDark) document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
})();
</script>
</head>
<body>

<header>
  <a class="back-btn" href="index.html"><i class="fas fa-arrow-left"></i></a>
  <h4>🎨 Custome Theme</h4>
</header>

<div class="active-info">
  <div class="dot"></div>
  <div>
    <div class="label">Active Theme</div>
    <div class="name" id="activeThemeName">Loading...</div>
  </div>
</div>

<div class="section-title">Choose Your Store Look</div>

<div class="theme-grid" id="themeGrid"></div>

<div class="apply-wrap">
  <button class="apply-btn" id="applyBtn" onclick="applyTheme()">
    <i class="fas fa-check-circle"></i> Apply Theme
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://delight-backend--araindaniyalo2.replit.app";
const phone = localStorage.getItem("sellerPhone");
let currentTheme = "default";
let selectedTheme = "default";

const THEMES = [
  { id:"default", name:"🔥 Delight Orange", desc:"Classic warm orange", headerGrad:"linear-gradient(135deg,#ff5500,#ff7b00,#ff9500)", accent:"#ff6b00", bg:"#f2f2f7", cardBg:"#fff", priceColor:"#ff6b00" },
  { id:"midnight", name:"🌙 Midnight Blue", desc:"Dark elegant blue", headerGrad:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)", accent:"#818cf8", bg:"#0f0f1a", cardBg:"#1a1a2e", priceColor:"#818cf8" },
  { id:"rose", name:"🌹 Rose Gold", desc:"Elegant rose & pink", headerGrad:"linear-gradient(135deg,#c94b4b,#e57373,#f48fb1)", accent:"#e57373", bg:"#fff0f3", cardBg:"#fff", priceColor:"#c94b4b" },
  { id:"forest", name:"🌿 Forest Green", desc:"Natural calm green", headerGrad:"linear-gradient(135deg,#1b5e20,#2e7d32,#43a047)", accent:"#43a047", bg:"#f1f8f1", cardBg:"#fff", priceColor:"#2e7d32" },
  { id:"ocean", name:"🌊 Ocean Blue", desc:"Fresh cool blue", headerGrad:"linear-gradient(135deg,#0277bd,#0288d1,#29b6f6)", accent:"#0288d1", bg:"#e8f4fd", cardBg:"#fff", priceColor:"#0277bd" },
  { id:"purple", name:"💜 Royal Purple", desc:"Luxurious purple", headerGrad:"linear-gradient(135deg,#4a148c,#7b1fa2,#ab47bc)", accent:"#7b1fa2", bg:"#f5f0ff", cardBg:"#fff", priceColor:"#7b1fa2" },
  { id:"golden", name:"✨ Golden Luxury", desc:"Premium gold theme", headerGrad:"linear-gradient(135deg,#b8860b,#daa520,#ffd700)", accent:"#b8860b", bg:"#fffef0", cardBg:"#fff", priceColor:"#b8860b" },
  { id:"teal", name:"🦋 Teal Breeze", desc:"Modern teal vibes", headerGrad:"linear-gradient(135deg,#00695c,#00897b,#26a69a)", accent:"#00897b", bg:"#e8f5f3", cardBg:"#fff", priceColor:"#00695c" },
  { id:"sunset", name:"🌅 Sunset Vibes", desc:"Warm golden tones", headerGrad:"linear-gradient(135deg,#f7971e,#ffd200,#f7971e)", accent:"#f7971e", bg:"#fffbf0", cardBg:"#fff", priceColor:"#e07b00" },
  { id:"cherry", name:"🍒 Cherry Blossom", desc:"Soft pink & white", headerGrad:"linear-gradient(135deg,#e91e8c,#ff5caa,#ff8fc1)", accent:"#e91e8c", bg:"#fff5f9", cardBg:"#fff", priceColor:"#e91e8c" },
  { id:"slate", name:"🪨 Slate Dark", desc:"Professional dark", headerGrad:"linear-gradient(135deg,#1c1c2e,#2d2d44,#3f3f60)", accent:"#6c8ebf", bg:"#1c1c2e", cardBg:"#2d2d44", priceColor:"#6c8ebf" },
  { id:"coral", name:"🪸 Coral Reef", desc:"Vibrant coral orange", headerGrad:"linear-gradient(135deg,#ff6b6b,#ff8e53,#ff6b35)", accent:"#ff6b35", bg:"#fff5f0", cardBg:"#fff", priceColor:"#ff6b35" },
  { id:"indigo", name:"🔷 Indigo Night", desc:"Deep indigo blue", headerGrad:"linear-gradient(135deg,#1a237e,#283593,#3949ab)", accent:"#3949ab", bg:"#eef0ff", cardBg:"#fff", priceColor:"#1a237e" },
  { id:"mint", name:"🍃 Mint Fresh", desc:"Cool minty green", headerGrad:"linear-gradient(135deg,#00b09b,#96c93d,#00b09b)", accent:"#00b09b", bg:"#f0fff9", cardBg:"#fff", priceColor:"#00897b" },
  { id:"crimson", name:"❤️ Crimson Power", desc:"Bold deep red", headerGrad:"linear-gradient(135deg,#b71c1c,#c62828,#ef5350)", accent:"#c62828", bg:"#fff5f5", cardBg:"#fff", priceColor:"#b71c1c" },
  { id:"cyber", name:"🤖 Cyber Neon", desc:"Neon dark futuristic", headerGrad:"linear-gradient(135deg,#000000,#0a0a0a,#1a1a1a)", accent:"#00ffaa", bg:"#080808", cardBg:"#111", priceColor:"#00ffaa" },
  { id:"lavender", name:"🪻 Lavender Dream", desc:"Soft calming purple", headerGrad:"linear-gradient(135deg,#7c3aed,#8b5cf6,#a78bfa)", accent:"#7c3aed", bg:"#f5f3ff", cardBg:"#fff", priceColor:"#7c3aed" },
  { id:"earth", name:"🌍 Earthy Brown", desc:"Warm natural tones", headerGrad:"linear-gradient(135deg,#5d4037,#795548,#a1887f)", accent:"#795548", bg:"#fdf8f3", cardBg:"#fff", priceColor:"#5d4037" },
  { id:"sky", name:"☁️ Sky White", desc:"Clean minimal white", headerGrad:"linear-gradient(135deg,#4facfe,#00f2fe,#4facfe)", accent:"#4facfe", bg:"#f7fbff", cardBg:"#fff", priceColor:"#0288d1" },
  { id:"aurora", name:"🌌 Aurora Borealis", desc:"Galaxy multicolor", headerGrad:"linear-gradient(135deg,#f953c6,#b91d73,#4776e6)", accent:"#f953c6", bg:"#0d0020", cardBg:"#1a0035", priceColor:"#f953c6" },
  { id:"olive", name:"🫒 Olive & Cream", desc:"Stylish olive tones", headerGrad:"linear-gradient(135deg,#556b2f,#6b8e23,#808000)", accent:"#6b8e23", bg:"#f8f7f0", cardBg:"#fff", priceColor:"#556b2f" },
  { id:"black", name:"🖤 Pure Black", desc:"Sleek total dark", headerGrad:"linear-gradient(135deg,#000,#111,#1a1a1a)", accent:"#e0e0e0", bg:"#000", cardBg:"#111", priceColor:"#e0e0e0" }
];

function renderThemes() {
  const grid = document.getElementById("themeGrid");
  grid.innerHTML = "";
  THEMES.forEach(t => {
    const card = document.createElement("div");
    card.className = "theme-card" + (t.id === selectedTheme ? " selected" : "");
    card.onclick = () => selectTheme(t.id);
    card.innerHTML = `
      <div class="theme-preview" style="background:${t.bg}">
        <div class="preview-header" style="background:${t.headerGrad}">
          <div class="preview-logo"></div>
          <div class="preview-header-title">My Store</div>
          <i class="fas fa-search" style="color:rgba(255,255,255,0.8);font-size:7px"></i>
        </div>
        <div class="preview-cards">
          ${[1,2,3].map(()=>`
            <div class="preview-card" style="background:${t.cardBg}">
              <div class="preview-card-img" style="background:${t.accent}22"></div>
              <div class="preview-card-body">
                <div class="preview-card-line"></div>
                <div class="preview-card-price" style="background:${t.priceColor}55"></div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
      <div class="theme-label">
        <div class="theme-name">${t.name}</div>
        <div class="theme-desc">${t.desc}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function selectTheme(id) {
  selectedTheme = id;
  renderThemes();
  const t = THEMES.find(x => x.id === id);
  if (t) document.getElementById("activeThemeName").textContent = t.name + " (unsaved)";
}

async function applyTheme() {
  if (!phone) { showToast("⚠️ Please login first!"); return; }
  const btn = document.getElementById("applyBtn");
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Applying...';
  try {
    const res = await fetch(`${API}/seller-theme`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, theme: selectedTheme })
    });
    const data = await res.json();
    if (data.success) {
      currentTheme = selectedTheme;
      localStorage.setItem("storeTheme", selectedTheme);
      const t = THEMES.find(x => x.id === selectedTheme);
      document.getElementById("activeThemeName").textContent = t ? t.name : selectedTheme;
      showToast("✅ Theme Applied Successfully!");
    } else {
      showToast("❌ Error: " + data.message);
    }
  } catch(e) {
    showToast("❌ No internet Connection please try again");
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-check-circle"></i> Apply Theme';
}

async function loadCurrentTheme() {
  if (!phone) {
    document.getElementById("activeThemeName").textContent = "Login required";
    renderThemes(); return;
  }
  try {
    const res = await fetch(`${API}/seller-theme/${phone}`);
    const data = await res.json();
    if (data.success) {
      currentTheme = data.theme || "default";
      selectedTheme = currentTheme;
      localStorage.setItem("storeTheme", currentTheme);
    }
  } catch(e) {
    const saved = localStorage.getItem("storeTheme");
    if (saved) { currentTheme = saved; selectedTheme = saved; }
  }
  const t = THEMES.find(x => x.id === currentTheme);
  document.getElementById("activeThemeName").textContent = t ? t.name : "Default";
  renderThemes();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadCurrentTheme();
</script>
</body>
</html>

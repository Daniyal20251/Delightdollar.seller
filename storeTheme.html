<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon — Delightpk</title>
  <meta name="description" content="Something big is being built. Delightpk is coming soon.">
  <link rel="icon" type="image/png" href="https://delightpk.shop/Delightpk.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #ff6a00;
      --amber:   #ff9500;
      --glow:    rgba(255, 106, 0, 0.28);
      --bg:      #080810;
      --card:    rgba(20, 20, 35, 0.85);
      --border:  rgba(255, 255, 255, 0.08);
      --txt1:    #f2f2fa;
      --txt2:    #8888aa;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--txt1);
      overflow-x: hidden;
    }

    /* ── MESH BG ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 55% at 15% 5%,  rgba(255,106,0,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(124,58,237,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 80% 5%,  rgba(255,149,0,0.06) 0%, transparent 60%);
    }

    /* ── STARS ── */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,0.6)} }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }
    .logo img {
      width: 38px; height: 38px;
      border-radius: 10px;
      object-fit: contain;
    }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6a00, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* ── CONSTRUCTION SCENE ── */
    .scene-wrapper {
      width: 100%;
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
      margin-bottom: 12px;
    }
    .scene-wrapper svg { width: 100%; height: auto; display: block; }

    /* Crane hook swing */
    @keyframes swingHook {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }
    @keyframes swingRope {
      0%,100% { transform: skewX(-3deg); }
      50%      { transform: skewX(3deg); }
    }
    .hook-group { transform-origin: 50% 0%; animation: swingHook 2.8s ease-in-out infinite; }

    /* Worker bob */
    @keyframes bobWorker {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .worker { animation: bobWorker 1.8s ease-in-out infinite; }

    /* Dust particles */
    @keyframes dustFloat {
      0%   { opacity: 0; transform: translate(0,0) scale(0.6); }
      40%  { opacity: 0.7; }
      100% { opacity: 0; transform: translate(var(--dx,20px), -30px) scale(1.2); }
    }
    .dust { animation: dustFloat var(--dd,1.8s) ease-out infinite var(--ds,0s); opacity: 0; }

    /* Scaffolding lights blink */
    @keyframes blinkLight {
      0%,49%{ opacity: 1; }
      50%,100%{ opacity: 0.2; }
    }
    .blink1 { animation: blinkLight 1.1s ease infinite; }
    .blink2 { animation: blinkLight 1.1s ease 0.55s infinite; }

    /* ── HEADLINE ── */
    .headline-block {
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,106,0,0.12);
      border: 1px solid rgba(255,106,0,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .eyebrow span { width: 6px; height: 6px; background: var(--orange); border-radius: 50%; display: inline-block; animation: blinkLight 1s ease infinite; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(30px, 8vw, 52px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1px;
      margin-bottom: 14px;
    }
    h1 .accent {
      background: linear-gradient(135deg, #ff6a00, #ff9500, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub {
      color: var(--txt2);
      font-size: 15px;
      line-height: 1.65;
      max-width: 360px;
      margin: 0 auto;
      font-weight: 500;
    }


    .cd-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 14px 12px;
      min-width: 68px;
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .cd-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #ff6a00, #ff9500);
      border-radius: 16px 16px 0 0;
    }
    .cd-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(180deg, #fff 60%, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      display: block;
    }
    .cd-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--txt2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 5px;
      display: block;
    }
    .cd-sep {
      color: var(--orange);
      font-size: 28px;
      font-weight: 900;
      align-self: center;
      margin-top: -10px;
      opacity: 0.6;
    }
    /* ── FOOTER ── */
    .footer {
      color: var(--txt2);
      font-size: 12px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.5s forwards;
    }
    .footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      .cd-block { min-width: 56px; padding: 12px 8px 10px; }
      .cd-num { font-size: 26px; }
      .notify-row { flex-direction: column; }
      .notify-btn { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="page">

  <!-- Logo -->
  <div class="logo">
    <img src="https://delightpk.shop/Delightpk.png" alt="Delightpk" onerror="this.style.display='none'">
    <span class="logo-text">Delightpk</span>
  </div>

  <!-- Construction Scene SVG -->
  <div class="scene-wrapper">
    <svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" aria-label="Construction site illustration">
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d0d1f"/>
          <stop offset="100%" stop-color="#1a1a30"/>
        </linearGradient>
        <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1e2040"/>
          <stop offset="100%" stop-color="#12142a"/>
        </linearGradient>
        <linearGradient id="craneGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ff6a00"/>
          <stop offset="100%" stop-color="#ff9500"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softGlow">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Sky -->
      <rect width="480" height="300" fill="url(#skyGrad)"/>

      <!-- Moon -->
      <circle cx="420" cy="40" r="20" fill="#fffbe6" filter="url(#softGlow)" opacity="0.9"/>
      <circle cx="428" cy="36" r="16" fill="#1a1a30"/>

      <!-- Stars in sky -->
      <circle cx="60"  cy="25" r="1.2" fill="#fff" opacity="0.8"/>
      <circle cx="130" cy="18" r="0.9" fill="#fff" opacity="0.6"/>
      <circle cx="210" cy="30" r="1"   fill="#fff" opacity="0.7"/>
      <circle cx="290" cy="12" r="1.3" fill="#fff" opacity="0.9"/>
      <circle cx="350" cy="35" r="0.8" fill="#fff" opacity="0.5"/>
      <circle cx="40"  cy="55" r="0.9" fill="#fff" opacity="0.6"/>
      <circle cx="170" cy="10" r="1.1" fill="#fff" opacity="0.8"/>
      <circle cx="390" cy="18" r="0.7" fill="#fff" opacity="0.5"/>

      <!-- Ground -->
      <rect x="0" y="260" width="480" height="40" fill="#0c0e1e"/>
      <rect x="0" y="258" width="480" height="4" fill="#1a1d38"/>

      <!-- ── BUILDING UNDER CONSTRUCTION ── -->
      <!-- Base / Foundation -->
      <rect x="120" y="200" width="200" height="60" fill="#14162e" stroke="#222440" stroke-width="1"/>
      <!-- Floors -->
      <rect x="130" y="160" width="180" height="42" fill="url(#buildGrad)" stroke="#1e2147" stroke-width="1"/>
      <rect x="140" y="120" width="160" height="42" fill="url(#buildGrad)" stroke="#1e2147" stroke-width="1"/>
      <rect x="150" y="90"  width="140" height="32" fill="#161830" stroke="#1e2147" stroke-width="1"/>

      <!-- Scaffolding lines -->
      <line x1="125" y1="90" x2="125" y2="260" stroke="#ff6a00" stroke-width="1.5" opacity="0.5"/>
      <line x1="315" y1="90" x2="315" y2="260" stroke="#ff6a00" stroke-width="1.5" opacity="0.5"/>
      <line x1="125" y1="120" x2="315" y2="120" stroke="#ff6a00" stroke-width="1" opacity="0.35"/>
      <line x1="125" y1="160" x2="315" y2="160" stroke="#ff6a00" stroke-width="1" opacity="0.35"/>
      <line x1="125" y1="200" x2="315" y2="200" stroke="#ff6a00" stroke-width="1" opacity="0.35"/>

      <!-- Windows Floor 1 (ground level) -->
      <rect x="145" y="212" width="22" height="28" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="177" y="212" width="22" height="28" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="209" y="212" width="22" height="28" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="241" y="212" width="22" height="28" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="273" y="212" width="22" height="28" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>

      <!-- Windows Floor 2 — some lit -->
      <rect x="142" y="170" width="24" height="18" rx="2" fill="#ff9500" opacity="0.85" filter="url(#glow)"/>
      <rect x="176" y="170" width="24" height="18" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="210" y="170" width="24" height="18" rx="2" fill="#ff9500" opacity="0.7" filter="url(#glow)"/>
      <rect x="244" y="170" width="24" height="18" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="278" y="170" width="24" height="18" rx="2" fill="#ff9500" opacity="0.8" filter="url(#glow)"/>

      <!-- Windows Floor 3 — some lit -->
      <rect x="152" y="130" width="20" height="16" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="183" y="130" width="20" height="16" rx="2" fill="#ff9500" opacity="0.6" filter="url(#glow)"/>
      <rect x="214" y="130" width="20" height="16" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="245" y="130" width="20" height="16" rx="2" fill="#ff9500" opacity="0.75" filter="url(#glow)"/>
      <rect x="276" y="130" width="20" height="16" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>

      <!-- Top floor (unfinished) -->
      <rect x="155" y="96"  width="18" height="14" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="183" y="96"  width="18" height="14" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>
      <rect x="268" y="96"  width="18" height="14" rx="2" fill="#0d2040" stroke="#1e3560" stroke-width="1"/>

      <!-- Scaffolding blink lights -->
      <circle cx="125" cy="92"  r="4" fill="#ff6a00" class="blink1" filter="url(#glow)"/>
      <circle cx="315" cy="92"  r="4" fill="#ff6a00" class="blink2" filter="url(#glow)"/>
      <circle cx="125" cy="160" r="3" fill="#ffb347" class="blink2" filter="url(#glow)"/>
      <circle cx="315" cy="160" r="3" fill="#ffb347" class="blink1" filter="url(#glow)"/>

      <!-- Dust particles left -->
      <circle cx="115" cy="240" r="4" fill="#ff6a00" opacity="0.5" class="dust" style="--dd:2.1s;--ds:0.2s;--dx:-18px"/>
      <circle cx="108" cy="250" r="3" fill="#ff9500" opacity="0.4" class="dust" style="--dd:1.7s;--ds:0.8s;--dx:-12px"/>
      <circle cx="120" cy="245" r="5" fill="#ffb347" opacity="0.3" class="dust" style="--dd:2.4s;--ds:0s;--dx:-22px"/>

      <!-- ── CRANE ── -->
      <!-- Crane base -->
      <rect x="56" y="180" width="24" height="80" rx="3" fill="url(#craneGrad)"/>
      <!-- Cross braces on column -->
      <line x1="56" y1="200" x2="80" y2="220" stroke="#c44d00" stroke-width="1.5" opacity="0.6"/>
      <line x1="80" y1="200" x2="56" y2="220" stroke="#c44d00" stroke-width="1.5" opacity="0.6"/>
      <line x1="56" y1="230" x2="80" y2="250" stroke="#c44d00" stroke-width="1.5" opacity="0.6"/>
      <line x1="80" y1="230" x2="56" y2="250" stroke="#c44d00" stroke-width="1.5" opacity="0.6"/>
      <!-- Cab -->
      <rect x="52" y="164" width="32" height="18" rx="4" fill="url(#craneGrad)"/>
      <rect x="56" y="167" width="10" height="10" rx="2" fill="#ffe0a0" opacity="0.9"/>
      <!-- Jib (horizontal arm) -->
      <rect x="34" y="155" width="160" height="10" rx="3" fill="url(#craneGrad)"/>
      <!-- Counter jib -->
      <rect x="22" y="155" width="36" height="8" rx="3" fill="#cc5500"/>
      <!-- Counter weight -->
      <rect x="16" y="155" width="18" height="22" rx="4" fill="#cc5500"/>
      <!-- Jib tip light -->
      <circle cx="192" cy="158" r="4" fill="#ff0000" class="blink1" filter="url(#glow)"/>

      <!-- Trolley -->
      <rect x="148" y="163" width="14" height="8" rx="2" fill="#cc5500"/>

      <!-- Rope + Hook (animated) -->
      <g class="hook-group" style="transform-origin: 155px 163px;">
        <line x1="155" y1="163" x2="155" y2="198" stroke="#888" stroke-width="2"/>
        <!-- Hook shape -->
        <path d="M150 198 Q148 210 155 212 Q162 214 163 208 Q164 202 158 200 L158 198" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Load block -->
        <rect x="148" y="195" width="14" height="8" rx="2" fill="#665500"/>
      </g>

      <!-- ── WORKER on scaffold ── -->
      <g class="worker" style="transform-origin: 300px 145px;">
        <!-- Body -->
        <rect x="293" y="145" width="14" height="16" rx="3" fill="#ff6a00"/>
        <!-- Hard hat -->
        <ellipse cx="300" cy="143" rx="9" ry="5" fill="#ff9500"/>
        <rect x="292" y="140" width="16" height="4" rx="2" fill="#ff6a00"/>
        <!-- Head -->
        <circle cx="300" cy="140" r="7" fill="#f5c18a"/>
        <!-- Legs -->
        <rect x="294" y="160" width="5"  height="12" rx="2" fill="#1e2040"/>
        <rect x="301" y="160" width="5"  height="12" rx="2" fill="#1e2040"/>
        <!-- Tool in hand -->
        <line x1="307" y1="152" x2="320" y2="148" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="318" y="142" width="8" height="10" rx="1" fill="#666"/>
      </g>

      <!-- Ground details: barriers -->
      <rect x="90"  y="252" width="12" height="10" rx="1" fill="#ff6a00" opacity="0.9"/>
      <rect x="108" y="252" width="12" height="10" rx="1" fill="#ffffff" opacity="0.2"/>
      <rect x="90"  y="262" width="30" height="3"  rx="1" fill="#ff6a00" opacity="0.5"/>
      <rect x="340" y="252" width="12" height="10" rx="1" fill="#ff6a00" opacity="0.9"/>
      <rect x="358" y="252" width="12" height="10" rx="1" fill="#ffffff" opacity="0.2"/>
      <rect x="340" y="262" width="30" height="3"  rx="1" fill="#ff6a00" opacity="0.5"/>

      <!-- Orange glow under building -->
      <ellipse cx="220" cy="264" rx="110" ry="8" fill="#ff6a00" opacity="0.08"/>

      <!-- "UNDER CONSTRUCTION" sign on building -->
      <rect x="160" y="76" width="120" height="18" rx="4" fill="#ff6a00"/>
      <text x="220" y="89" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="800" fill="#fff" letter-spacing="0.5">UNDER CONSTRUCTION</text>
    </svg>
  </div>

<!-- Headline -->
<div class="headline-block">
  <div class="eyebrow"><span></span> New Feature Coming</div>
  <h1>Make Your Store<br><span class="accent">Truly Yours.</span></h1>
  <p class="sub">Choose from 20+ stunning store themes — built for Pakistani sellers. Your brand, your style, your customers. Launching very soon.</p>
</div>
  <!-- Footer -->
  <div class="footer">
    <p>© 2025 Delightpk - Owner of Daniyal Arain</p>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b00">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DPK Seller">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>My Store - Delightpk</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --bg-body: #f2f3f7;
      --bg-card: #ffffff;
      --bg-input: #f8f8fb;
      --text-primary: #222233;
      --text-secondary: #7778a0;
      --accent: #ef6c00;
      --accent-gradient: linear-gradient(135deg, #ff9800, #ef6c00);
      --border-color: #e6e6f0;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-header: 0 3px 16px rgba(239,108,0,0.15);
      --bottom-bar-bg: #fff;
      --skeleton-base: #e8e8f0;
      --skeleton-shine: #f4f4f8;
    }

    [data-theme="dark"] {
      --bg-body: #0d0d1f;
      --bg-card: #1a1a2e;
      --bg-input: #22223a;
      --text-primary: #e8e8f5;
      --text-secondary: #9090b8;
      --accent: #ff9800;
      --border-color: #2a2a44;
      --shadow-card: 0 4px 20px rgba(0,0,0,0.45);
      --bottom-bar-bg: #1a1a2e;
      --skeleton-base: #22223a;
      --skeleton-shine: #2c2c4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      padding-top: 80px;
      padding-bottom: 72px;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #f4511e, #ffa726);
      z-index: 9998;
      padding: 0 16px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-header);
    }

    .logo1 img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      flex-shrink: 0;
      background: white;
    }

    .header-title {
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.3px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== SEARCH BAR ===== */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 64px;
      z-index: 997;
    }

    #searchInput {
      flex: 1;
      padding: 5px 16px;
      border-radius: 24px;
      border: 1.5px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      outline: none;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239,108,0,0.12);
    }

    .search-btn {
      padding: 5px 18px;
      border: none;
      border-radius: 22px;
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(239,108,0,0.3);
    }

    /* ===== SEARCH PANEL ===== */
    .search-panel {
      position: fixed;
      top: 120px;
      left: 0;
      width: 100%;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      z-index: 996;
      display: none;
      padding: 12px 14px;
      max-height: 280px;
      overflow-y: auto;
    }

    .search-panel.active { display: block; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .recent-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
    }

    .clear-btn {
      background: #ff4d4f;
      color: #fff;
      border: none;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
    }

    #recentSearches {
      list-style: none;
    }

    #recentSearches li {
      padding: 8px 4px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
    }

    #recentSearches li:hover { background: var(--bg-input); border-radius: 8px; }

    .suggestions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .suggestions span {
      display: inline-block;
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border-color);
    }

    .suggestions span:hover { background: var(--border-color); }

    /* ===== PRODUCT GRID ===== */
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
    }

    /* ===== UPLOAD CARD ===== */
    .upload-card {
      position: relative;
      background: linear-gradient(135deg, #fff8f0, #fff3e0);
      border: 2.5px dashed var(--accent);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      min-height: 200px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    [data-theme="dark"] .upload-card {
      background: linear-gradient(135deg, #1a1a2e, #22223a);
    }

    .upload-card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(239,108,0,0.2);
    }

    .upload-card .upload-icon {
      width: 54px;
      height: 54px;
      background: var(--accent-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(239,108,0,0.35);
    }

    .upload-card .upload-icon i {
      font-size: 22px;
      color: #fff;
    }

    .upload-card .upload-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.3px;
    }

    .upload-card .upload-sub {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* ===== ITEM CARD ===== */
    .item-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .item-card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: var(--bg-input);
      border-bottom: 1px solid var(--border-color);
    }

    .card-body {
      padding: 8px 10px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-card h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .price-wrapper {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: auto;
    }

    .new-price {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
    }

    .old-price {
      font-size: 11px;
      color: var(--text-secondary);
      text-decoration: line-through;
    }

    /* Views Badge */
    .views-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(4px);
    }

    .views-badge i { font-size: 9px; color: #ffe082; }

    /* Delete Button */
    .delete-btn {
      position: absolute;
      top: 7px;
      right: 7px;
      background: #ff4d4f;
      border: none;
      color: #fff;
      font-size: 13px;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { background: #c0392b; }

    /* ===== SKELETON LOADING ===== */
    @keyframes shimmer {
      0% { background-position: -300px 0; }
      100% { background-position: 300px 0; }
    }

    .skeleton-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .skeleton-img {
      width: 100%;
      height: 140px;
      background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .skeleton-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-line {
      height: 11px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    .skeleton-line.short { width: 55%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-line.price { width: 40%; height: 14px; margin-top: 6px; }

    /* ===== NOT FOUND ===== */
    .not-found {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }

    .not-found img {
      width: 150px;
      max-width: 80%;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .not-found h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    /* ===== BOTTOM BAR ===== */
    .bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--bottom-bar-bg);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 12px;
      z-index: 9999;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.07);
      border-top: 1px solid var(--border-color);
    }

    .bar a {
      text-decoration: none;
      color: var(--text-secondary);
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px 10px;
      border-radius: 12px;
      transition: color 0.2s ease;
      position: relative;
      font-family: 'Nunito', sans-serif;
    }

    .bar a i { font-size: 19px; }

    .bar a.active { color: var(--accent); }

    .bar a.active::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .nav-badge {
      position: absolute;
      top: 0;
      right: 4px;
      background: #ff4d4f;
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 10px;
      font-weight: 800;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo1">
      <img id="sellerLogo" src="lo.png" alt="Logo">
    </div>
    <span class="header-title" id="sellerName">DELIGHT.PK</span>
    </button>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="🔍 Search products..." autocomplete="off">
    <button onclick="searchItems()" class="search-btn">Search</button>
  </div>

  <!-- SEARCH PANEL -->
  <div id="searchPanel" class="search-panel">
    <div class="panel-header">
      <p class="recent-title">Recent Searches</p>
      <button id="clearHistoryBtn" class="clear-btn">Clear</button>
    </div>
    <ul id="recentSearches"></ul>
    <div class="suggestions">
      <span onclick="fillAndSearch('Tripod')">Tripod Stand</span>
      <span onclick="fillAndSearch('Wall Clock')">Wall Clock</span>
      <span onclick="fillAndSearch('Gripper')">Gripper</span>
      <span onclick="fillAndSearch('Smart Watch')">Smart Watch</span>
    </div>
  </div>

  <!-- PRODUCT GRID -->
  <div id="itemContainer" class="container">
    <!-- Skeleton placeholders shown at start -->
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line price"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line price"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line price"></div>
      </div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line price"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bar">
    <a href="index.html"><i class="fas fa-user"></i>Profile</a>
    <a href="myStore.html" class="active"><i class="fas fa-store"></i>Store</a>
    <a href="sellerOrders.html" id="nav-orders">
      <i class="fas fa-box"></i>Orders
      <span class="nav-badge" id="orderBadge" style="display:none;">0</span>
    </a>
    <a href="sellerChat.html">
      <i class="fas fa-comments"></i>Chat
      <span class="nav-badge" id="chatBadge" style="display:none;"></span>
    </a>
    <a href="Analytics.html"><i class="fas fa-chart-line"></i>Analytics</a>
  </div>

  <script src="myStore.js"></script>
  <script>
    // Theme init
    (function () {
      const isDark = localStorage.getItem("darkMode") === "true";
      if (isDark) {
        document.documentElement.setAttribute("data-theme", "dark");
        const knob = document.getElementById("themeKnob");
        if (knob) { knob.textContent = "☀️"; }
      }
    })();

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute("data-theme") === "dark";
      const knob = document.getElementById("themeKnob");
      if (isDark) {
        html.removeAttribute("data-theme");
        localStorage.setItem("darkMode", "false");
        if (knob) knob.textContent = "🌙";
      } else {
        html.setAttribute("data-theme", "dark");
        localStorage.setItem("darkMode", "true");
        if (knob) knob.textContent = "☀️";
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
    }
  </script>

</body>
</html>
